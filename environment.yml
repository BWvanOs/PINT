name: pint
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy>=1.24
  - pandas>=2.0
  - matplotlib>=3.7
  - uvicorn>=0.23
  - pillow>=10
  - tifffile>=2023.8   # for OME-TIFF loading
  - scikit-image>=0.22 # handy for image ops (optional but useful)
  - pip:
      - shiny==1.4.0   # Shiny for Python (pin to match your logs)
